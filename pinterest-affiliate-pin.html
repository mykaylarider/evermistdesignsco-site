<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evermist Designs Co Affiliate Pin</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #f6f1ea;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .pin {
      width: 1000px;
      height: 1500px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, .95) 0 155px, transparent 156px),
        linear-gradient(135deg, #f8efe6 0%, #eef3ef 42%, #f7dfd4 100%);
      color: #23312b;
      padding: 78px 72px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0;
      color: #2a3b34;
    }

    .badge {
      border: 3px solid #2f6b5d;
      background: #ffffff;
      border-radius: 999px;
      color: #2f6b5d;
      font-size: 28px;
      font-weight: 800;
      padding: 16px 28px;
      white-space: nowrap;
    }

    .headline {
      margin: 128px 0 0;
      max-width: 820px;
      font-size: 104px;
      line-height: .98;
      font-weight: 850;
      color: #1d2d28;
    }

    .headline span {
      color: #bf5d4b;
    }

    .subhead {
      margin: 42px 0 0;
      max-width: 760px;
      font-size: 42px;
      line-height: 1.25;
      font-weight: 600;
      color: #44504b;
    }

    .preview {
      position: absolute;
      left: 74px;
      right: 74px;
      bottom: 228px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .page {
      height: 285px;
      border-radius: 6px;
      background: #fffdf9;
      border: 3px solid rgba(35, 49, 43, .16);
      box-shadow: 0 20px 34px rgba(65, 50, 39, .16);
      padding: 28px;
    }

    .page-title {
      height: 24px;
      width: 76%;
      border-radius: 999px;
      background: #2f6b5d;
      margin-bottom: 28px;
    }

    .line {
      height: 12px;
      border-radius: 999px;
      background: #d9c9bc;
      margin: 17px 0;
    }

    .line.short {
      width: 64%;
    }

    .line.alt {
      background: #eeb9a8;
    }

    .cta {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      background: #23312b;
      color: #fffdf9;
      border-radius: 8px;
      padding: 32px 38px;
      font-size: 36px;
      font-weight: 800;
    }

    .cta span {
      color: #f5c9b8;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main class="pin" aria-label="Evermist Designs Co affiliate pin">
    <section class="brand">
      <div>Evermist Designs Co</div>
      <div class="badge">Affiliate Program</div>
    </section>

    <h1 class="headline">Earn <span>30%</span> promoting printable planners</h1>
    <p class="subhead">Home organization printables, family command centers, kitchen binders, and digital seller tools.</p>

    <section class="preview" aria-hidden="true">
      <div class="page">
        <div class="page-title"></div>
        <div class="line"></div>
        <div class="line alt"></div>
        <div class="line short"></div>
        <div class="line"></div>
      </div>
      <div class="page">
        <div class="page-title"></div>
        <div class="line alt"></div>
        <div class="line"></div>
        <div class="line short"></div>
        <div class="line alt"></div>
      </div>
      <div class="page">
        <div class="page-title"></div>
        <div class="line"></div>
        <div class="line short"></div>
        <div class="line alt"></div>
        <div class="line"></div>
      </div>
    </section>

    <div class="cta">
      <div>Join on Gumroad</div>
      <span>30% commission</span>
    </div>
  </main>
</body>
</html>
